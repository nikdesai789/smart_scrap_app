name: CI/CD Smart Scrap Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy to AWS
    runs-on: ubuntu-latest

    steps:
      # 1. Pull down your latest code from GitHub
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Log directly into your Ubuntu EC2 server over SSH and execute deployment steps
      - name: Deploy Application via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            echo "--- Connected to EC2 Server successfully! ---"
            
            # 1. Kill any stubborn frontend locks just in case
            sudo killall apt-get apt 2>/dev/null || true
            
            # 2. Directly install Docker bypassing general updates
            if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              sudo apt-get install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ubuntu
            fi

            # 3. Setup clean app directory workspace
            sudo mkdir -p /home/ubuntu/smart_scrap
            sudo chown -R ubuntu:ubuntu /home/ubuntu/smart_scrap
            
            cd /home/ubuntu/smart_scrap
            rm -rf *

            # 4. Download latest repository code bundle
            curl -L https://github.com/${{ github.repository }}/tarball/${{ github.sha }} -o app.tar.gz
            tar -xzf app.tar.gz --strip-components=1
            rm app.tar.gz

            echo "--- Code synced. Building Docker container... ---"
            
            # 5. Destroy old container versions if they exist
            sudo docker stop production-container 2>/dev/null || true
            sudo docker rm production-container 2>/dev/null || true

            # 6. Build and launch container environment
            sudo docker build -t smart-scrap-app .
            sudo docker run -d -p 80:8080 --restart always --name production-container smart-scrap-app
            
            echo "--- DEPLOYMENT SUCCESSFUL! ---"