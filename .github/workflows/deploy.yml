name: CI/CD Smart Scrap Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy to AWS
    runs-on: ubuntu-latest

    steps:
      # 1. Pull down your latest code from GitHub
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Log directly into your Ubuntu EC2 server over SSH and execute deployment steps
      - name: Deploy Application via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            echo "--- Connected to EC2 Server successfully! ---"
            
            # Update server packages
            sudo apt-get update -y
            
            # Install Docker if it doesn't exist
            if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              sudo apt-get install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ubuntu
            fi

            # Clean out or create our app folder workspace
            sudo mkdir -p /home/ubuntu/smart_scrap
            sudo chown -R ubuntu:ubuntu /home/ubuntu/smart_scrap
            
            # Navigate to workspace
            cd /home/ubuntu/smart_scrap

            # Clear out old files to ensure a clean slate
            rm -rf *

            # Download the latest code bundle directly from this commit
            curl -L https://github.com/${{ github.repository }}/tarball/${{ github.sha }} -o app.tar.gz
            tar -xzf app.tar.gz --strip-components=1
            rm app.tar.gz

            echo "--- Code synced. Building and starting Docker containers... ---"
            
            # Stop any older running containers to prevent port conflicts
            sudo docker stop $(sudo docker ps -aq) 2>/dev/null || true
            sudo docker rm $(sudo docker ps -aq) 2>/dev/null || true

            # Build and launch your production container
            sudo docker build -t smart-scrap-app .
            sudo docker run -d -p 80:8080 --restart always --name production-container smart-scrap-app
            
            echo "--- DEPLOYMENT SUCCESSFUL! ---"